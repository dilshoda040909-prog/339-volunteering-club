<!DOCTYPE html>
<html>
  <body>
    <!-- Static form skeleton for Netlify build-time detection. Never shown to users. -->
    <form name="event-signup" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="phone" />    
      <input type="text" name="event" />
      <input type="text" name="grade" />
      <textarea name="message"></textarea>
      <input type="text" name="bot-field" />
    </form>
    <form name="volunteer-application" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="grade" />
      <input type="text" name="phone" />
      <textarea name="skills"></textarea>
      <textarea name="motivation"></textarea>
      <input type="text" name="availability" />
      <input type="text" name="bot-field" />
    </form>
  </body>
</html>
